<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Urban Matrix Agentic AI OS dashboard concept</title>
  <desc id="desc">A refined command centre interface for architecture, BIM, AI agents, project delivery, and approval workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101418"/>
      <stop offset="48%" stop-color="#17211f"/>
      <stop offset="100%" stop-color="#1f2630"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
